<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Source Code | Bashar Rasras WAPH Project 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="source-page">
  <main class="section-block">
    <div class="container">
      <h1>WAPH Project 1 Source Code</h1>
      <p class="text-muted">Use this page to print the deployed source code from a browser as a PDF deliverable.</p>

      <h2>Project Files</h2>
      <ul>
        <li><a href="index.html">index.html</a></li>
        <li><a href="waph.html">waph.html</a></li>
        <li><a href="style.css">style.css</a></li>
        <li><a href="script.js">script.js</a></li>
        <li><a href="headshot.png">headshot.png</a></li>
      </ul>

      <h2>Source Location</h2>
      <p><a href="https://github.com/Bashar-R/rasrasbr.github.io/tree/main">https://github.com/Bashar-R/rasrasbr.github.io/tree/main</a></p>

      <div id="sourceOutput" class="mt-4"></div>
    </div>
  </main>
  <script>
    const files = ["index.html", "waph.html", "style.css", "script.js", "source.html"];
    const output = document.getElementById("sourceOutput");

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    async function renderSources() {
      for (const file of files) {
        const section = document.createElement("section");
        section.innerHTML = `<h2>${file}</h2><pre><code>Loading...</code></pre>`;
        output.appendChild(section);

        try {
          const response = await fetch(file);
          const text = await response.text();
          section.querySelector("code").innerHTML = escapeHtml(text);
        } catch (error) {
          section.querySelector("code").textContent = `Unable to load ${file}. Open this page through a web server or GitHub Pages before printing.`;
        }
      }
    }

    renderSources();
  </script>
</body>
</html>
